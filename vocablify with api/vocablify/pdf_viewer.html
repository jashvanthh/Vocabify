<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vocablify PDF Viewer</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      overflow-y: scroll;
    }
    #pdf-container {
      position: relative;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .page {
      position: relative;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      border-radius: 8px;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    #file-input {
      position: fixed;
      top: 10px;
      left: 10px;
      background: #3b82f6;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>
  <input type="file" id="file-input" accept="application/pdf">
  <div id="pdf-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf_viewer.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf_viewer.min.css">
  <script src="pdf_viewer.js"></script>
</body>
</html>
